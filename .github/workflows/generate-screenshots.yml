name: Generate Store Screenshots

on:
  workflow_dispatch:

jobs:
  record:
    name: Record Paparazzi snapshots & update store-listing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Record Paparazzi snapshots
        run: ./gradlew :app:recordPaparazzi --no-configuration-cache

      - name: List generated snapshots
        if: always()
        run: |
          echo "=== All PNGs anywhere under app/ (first 30) ==="
          find app -name "*.png" 2>/dev/null | head -30 || echo "(none)"
          echo "=== Expected snapshot dir contents ==="
          ls -la app/src/test/snapshots/images/ 2>/dev/null || echo "(dir missing)"

      - name: Upload Paparazzi report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-report
          path: app/build/reports/paparazzi/
          if-no-files-found: ignore
          retention-days: 7

      - name: Copy screenshots to store-listing
        run: |
          SNAP="app/src/test/snapshots/images/net.interstellarai.unreminder.screenshot"

          for f in phone_1 phone_2 phone_3; do
            cp "${SNAP}_PhoneScreenshotTest_${f}.png" store-listing/screenshots/${f}.png
          done
          for f in tablet7_1 tablet7_2 tablet7_3; do
            cp "${SNAP}_Tablet7ScreenshotTest_${f}.png" store-listing/screenshots/${f}.png
          done
          for f in tablet10_1 tablet10_2 tablet10_3; do
            cp "${SNAP}_Tablet10ScreenshotTest_${f}.png" store-listing/screenshots/${f}.png
          done

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store-listing/screenshots/ app/src/test/snapshots/
          git diff --staged --quiet && echo "No screenshot changes" && exit 0
          BRANCH="chore/update-screenshots-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update store screenshots from Paparazzi"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update store screenshots from Paparazzi" \
            --body "Auto-generated by the Generate Store Screenshots workflow." \
            --base main \
            --head "$BRANCH"
