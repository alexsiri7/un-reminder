name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Unit tests
        id: unit_tests
        run: ./gradlew test --stacktrace
        continue-on-error: true

      - name: Upload Paparazzi diff report
        if: steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-diff-${{ github.sha }}
          path: app/build/reports/paparazzi/
          if-no-files-found: ignore
          retention-days: 14

      - name: Record Paparazzi snapshots
        if: steps.unit_tests.outcome == 'failure' && github.event_name == 'pull_request'
        id: record
        run: |
          ./gradlew :app:recordPaparazzi --no-configuration-cache
          git add app/src/test/snapshots/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated snapshots to PR branch
        if: steps.record.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update Paparazzi snapshots [skip ci]"
          git push

      - name: Fail — snapshots updated, review required
        if: steps.record.outputs.changed == 'true'
        run: |
          echo "::error::Paparazzi snapshots were updated and committed to this branch. Review the image diffs in the PR and the 'paparazzi-diff' artifact, then re-run CI to confirm."
          exit 1

      - name: Fail — tests failed (non-snapshot reason)
        if: steps.unit_tests.outcome == 'failure' && steps.record.outputs.changed != 'true'
        run: exit 1

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_B64 secret is not set — release APK cannot be signed."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

      - name: Resolve version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Assemble signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload signed release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 7

  worker-typecheck:
    name: Worker type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck
