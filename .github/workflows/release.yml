name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 0.1.0) — only used for manual dispatch'
        required: true
        default: '0.1.0'

jobs:
  release:
    name: Build & publish signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_B64 secret is not set. Add it via: gh secret set KEYSTORE_B64"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

      - name: Resolve version
        run: |
          if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION_NAME="${{ inputs.version }}"
          else
            # main push: versionName derived from short SHA
            VERSION_NAME="main-$(git rev-parse --short HEAD)"
          fi
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "Building $VERSION_NAME (versionCode=$VERSION_CODE)"

      - name: Build signed AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Publish to Play Store internal track (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: net.interstellarai.unreminder
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
          releaseName: ${{ env.VERSION_NAME }}

      - name: Promote internal track draft to completed
        if: "!startsWith(github.ref, 'refs/tags/v')"
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install google-api-python-client google-auth --quiet
          python3 << 'EOF'
          import json, os, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          pkg = 'net.interstellarai.unreminder'
          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ['PLAY_SERVICE_ACCOUNT_JSON']),
              scopes=['https://www.googleapis.com/auth/androidpublisher']
          )
          svc = build('androidpublisher', 'v3', credentials=creds)
          edit = svc.edits().insert(packageName=pkg, body={}).execute()
          eid = edit['id']
          track = svc.edits().tracks().get(packageName=pkg, editId=eid, track='internal').execute()
          print(f"Track state: {json.dumps(track, indent=2)}")
          draft_release = None
          for r in track.get('releases', []):
              if r.get('status') == 'draft':
                  draft_release = r
          if not draft_release:
              print("No draft releases to promote")
              svc.edits().delete(packageName=pkg, editId=eid).execute()
              sys.exit(0)
          # Only send the new release as completed; omit older releases so Play retires them
          draft_release['status'] = 'completed'
          track['releases'] = [draft_release]
          svc.edits().tracks().update(packageName=pkg, editId=eid, track='internal', body=track).execute()
          svc.edits().commit(packageName=pkg, editId=eid).execute()
          print("Successfully promoted draft to completed")
          EOF

      - name: Publish to Play Store production (tag release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: net.interstellarai.unreminder
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: production
          status: completed
          releaseName: ${{ env.VERSION_NAME }}

      - name: Build signed universal APK (for sideload)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.VERSION_NAME }}-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.VERSION_NAME }}-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Notify prod landing
        if: success() && github.event_name != 'pull_request'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          pr=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number // empty')
          body="direct push: $(git log -1 --pretty=%s)"
          if [ -n "$pr" ]; then
            if gh pr view "$pr" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' | grep -qx 'no-ntfy'; then
              echo "PR #$pr has no-ntfy label — skipping"
              exit 0
            fi
            title=$(gh pr view "$pr" --repo "${{ github.repository }}" --json title --jq '.title')
            body="PR #$pr: $title (${VERSION_NAME})"
          fi
          curl -s -o /dev/null \
            -H "Title: ${{ github.event.repository.name }} landed in prod" \
            -H "Tags: tada" \
            -d "$body" "ntfy.sh/$NTFY_TOPIC"
