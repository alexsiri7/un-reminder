# Required secrets (set via wrangler secret put):
#   UR_SHARED_SECRET — shared auth secret for X-UR-Secret header
#   UR_REQUESTY_KEY  — Requesty.ai API key for LLM calls

name = "un-reminder-worker"
main = "src/index.ts"
compatibility_date = "2026-04-18"

[vars]
UR_DAILY_CAP_CENTS  = "50"
UR_MONTHLY_CAP_CENTS = "500"
UR_MODEL = "gemini-3-flash-preview"

[[kv_namespaces]]
binding = "UR_SPEND"
id      = "REPLACE_WITH_REAL_ID"          # run: wrangler kv namespace create UR_SPEND

[[ratelimits]]
name         = "REQUEST_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit  = 60
  period = 60
